<div class="dashboard-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Jules Hub</h1>
      <button class="btn-api-key" (click)="setApiKey()">API Key</button>
    </div>

    <nav class="nav-links">
      <a routerLink="/tasks" routerLinkActive="active" class="nav-item">
        <i class="icon">📋</i> Tasks
      </a>
      <a routerLink="/workspace" routerLinkActive="active" class="nav-item">
        <i class="icon">💻</i> Workspace
      </a>
    </nav>

    <div class="sources-section">
      <h3>Repositories</h3>
      <div *ngIf="loading()" class="loader">Loading...</div>
      <div *ngIf="error()" class="error">{{ error() }}</div>
      <ul class="sources-list">
        <li *ngFor="let source of sources()"
            (click)="selectSource(source)"
            class="source-item">
          <span class="source-name">{{ source.displayName || source.name }}</span>
        </li>
      </ul>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
