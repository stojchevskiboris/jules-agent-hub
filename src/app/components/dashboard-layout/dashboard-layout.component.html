<div class="dashboard-container">
  <!-- Mobile Header -->
  <header class="mobile-header">
    <button class="menu-btn" (click)="toggleSidebar()">
      <span class="hamburger"></span>
    </button>
    <h1 class="mobile-title">Jules Hub</h1>
    <button class="btn-api-key-small" (click)="setApiKey()">
      API <span *ngIf="apiKeyValid()" class="checkmark">✓</span>
    </button>
  </header>

  <!-- Sidebar Backdrop -->
  <div class="sidebar-backdrop" *ngIf="sidebarOpen()" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-header">
      <h1>Jules Hub</h1>
      <button class="btn-api-key" (click)="setApiKey()">
        API Key <span *ngIf="apiKeyValid()" class="checkmark">✓</span>
      </button>
    </div>

    <nav class="nav-links">
      <a routerLink="/tasks" routerLinkActive="active" class="nav-item">
        <i class="icon">📋</i> Tasks
      </a>
      <a routerLink="/workspace" routerLinkActive="active" class="nav-item">
        <i class="icon">💻</i> Workspace
      </a>
    </nav>

    <div class="sidebar-tabs-container">
      <div class="tabs-header">
        <button class="tab-btn" [class.active]="activeTab() === 'sessions'" (click)="setActiveTab('sessions')">
          Recent Sessions
        </button>
        <button class="tab-btn" [class.active]="activeTab() === 'sources'" (click)="setActiveTab('sources')">
          Repositories
        </button>
      </div>

      <div class="tab-content">
        <!-- Sessions Tab Panel -->
        <div class="tab-panel scrollable-panel" *ngIf="activeTab() === 'sessions'">
          <ul class="sessions-list">
            <li *ngFor="let session of sessions()" (click)="selectSession(session)" class="session-item"
                [class.active]="currentSessionId() === session.name">
              <span class="session-name">
                <span class="name-text">
                  {{ truncateTitle(session.title || getShortName(session.name), 30) }}
                  <span *ngIf="isAwaitingFeedback(session)">🧙‍♂️</span>
                </span>
                <span class="status-dot" [class]="getStateUI(session.state).class" [title]="getStateUI(session.state).description"></span>
                <span *ngIf="getPullRequest(session)?.merged === false" class="unmerged-icon" title="PR is not merged">🧩</span>
                <span *ngIf="getPullRequest(session)?.merged && session.state === 'COMPLETED'" class="merged-icon" title="PR is merged">✅</span>
              </span>
            </li>
          </ul>
          <div *ngIf="sessionNextPageToken()" class="load-more-container">
            <button (click)="loadMoreSessions()" class="load-more-btn" [disabled]="loadingMoreSessions()">
              {{ loadingMoreSessions() ? 'Loading...' : 'Load More' }}
            </button>
          </div>
        </div>

        <!-- Sources Tab Panel -->
        <div class="tab-panel scrollable-panel" *ngIf="activeTab() === 'sources'">
          <div *ngIf="loading()" class="loader">Loading...</div>
          <div *ngIf="error() && error() !== API_KEY_ERROR" class="error">{{ error() }}</div>
          <ul class="sources-list">
            <li *ngFor="let source of sources()" (click)="selectSource(source)" class="source-item"
                [class.active]="activeSource() === source.name">
              <span class="source-name">{{ source.githubRepo.repo || source.name }}</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div *ngIf="error() === API_KEY_ERROR" class="error-banner">
      <h2>API Key Required</h2>
      <p>A Jules API key is needed to access the dashboard and repositories.</p>
      <button class="btn-api-key-large" (click)="setApiKey()">Enter API Key</button>
    </div>
    <router-outlet *ngIf="error() !== API_KEY_ERROR"></router-outlet>
  </main>
</div>
